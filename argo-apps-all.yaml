apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-database
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Ratedo/ks.git'
    targetRevision: HEAD
    path: charts/db-chart
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Создаст namespace, если его нет

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-web-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Ratedo/ks.git'
    targetRevision: HEAD
    path: charts/app-chart
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground # Более чистое удаление старых ресурсов

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Ratedo/ks.git'
    targetRevision: HEAD
    path: charts/monitoring-chart # Путь к вашему новому третьему блоку
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
