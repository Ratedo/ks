apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-database
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Ratedo/ks.git'
    targetRevision: HEAD
    path: charts/db-chart
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
